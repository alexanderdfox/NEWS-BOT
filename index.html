<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Question Speaker</title>
  <style>
	body {
	  font-family: Arial, sans-serif;
	  display: flex;
	  flex-direction: column;
	  align-items: center;
	  justify-content: center;
	  height: 100vh;
	  background: #111;
	  color: #fff;
	  gap: 20px;
	}
	button {
	  padding: 12px 20px;
	  font-size: 16px;
	  cursor: pointer;
	  border: none;
	  border-radius: 8px;
	  margin: 5px;
	}
	#start { background: #4CAF50; color: white; }
	#stop { background: #f44336; color: white; }
	.controls {
	  display: flex;
	  gap: 10px;
	}
	.slider-container {
	  text-align: center;
	}
  </style>
</head>
<body>

<h1>Random Question Speaker</h1>

<div class="controls">
  <button id="start">Start</button>
  <button id="stop">Stop</button>
</div>

<div class="slider-container">
  <label>Delay: <span id="delayValue">0.6</span> seconds</label><br>
  <input type="range" id="delaySlider" min="0.2" max="3" step="0.1" value="0.6">
</div>

<script>
const questions = ["What?", "Why?", "Where?", "Who?", "How?"];
let running = false;
let delay = 600;

const slider = document.getElementById("delaySlider");
const delayValue = document.getElementById("delayValue");

slider.addEventListener("input", () => {
  delay = slider.value * 1000;
  delayValue.textContent = slider.value;
});

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
	const j = Math.floor(Math.random() * (i + 1));
	[array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function speak(text) {
  return new Promise(resolve => {
	const utterance = new SpeechSynthesisUtterance(text);
	utterance.onend = resolve;
	speechSynthesis.speak(utterance);
  });
}

async function loop() {
  while (running) {
	const shuffled = shuffle([...questions]);

	for (const q of shuffled) {
	  if (!running) return;
	  console.log(q);
	  await speak(q);
	  await new Promise(r => setTimeout(r, delay));
	}
  }
}

document.getElementById("start").onclick = () => {
  if (!running) {
	running = true;
	loop();
  }
};

document.getElementById("stop").onclick = () => {
  running = false;
  speechSynthesis.cancel();
};
</script>

</body>
</html>
